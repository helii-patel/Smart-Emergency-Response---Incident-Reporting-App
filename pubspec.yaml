name: emergency_response_app
description: Smart Emergency Response & Incident Reporting App with offline-first support.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.0.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Date/Time formatting
  intl: ^0.19.0
  
  # Location services
  geolocator: ^9.0.0
  
  # UUID generation
  uuid: ^4.0.0
  
  # Google Maps (optional for location visualization)
  google_maps_flutter: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Hive code generation
  hive_generator: ^2.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
